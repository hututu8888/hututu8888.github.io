<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胡雨佳 | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/nes.css/css/nes.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f4f4f4] p-4">
    <div class="max-w-4xl mx-auto">
        <nav class="nes-container is-rounded mb-10 bg-white flex justify-around p-2">
            <a href="index.html" class="nes-btn is-primary text-[10px]">主页</a>
            <a href="projects.html" class="nes-btn text-[10px]">项目</a>
            <a href="about.html" class="nes-btn text-[10px]">关于</a>
            <a href="contact.html" class="nes-btn text-[10px]">联系</a>
        </nav>

        <section class="nes-container with-title bg-white">
            <p class="title text-[10px]">Player Info</p>
            <div class="flex flex-col md:flex-row items-center gap-10 p-4">
                <img src="assets/avatar.jpg" alt="Avatar" class="pixel-avatar w-40 h-40 border-4 border-black shadow-pixel">
                <div class="space-y-4">
                    <h1 class="text-xl font-bold">胡雨佳 (HUTUTU)</h1>
                    <p class="nes-badge"><span class="is-warning text-[8px]">LEVEL 24 DEVELOPER</span></p>
                    <div class="nes-balloon from-left">
                        <p class="text-sm">你好，世界！我正在收集代码碎片以合成最终神器。</p>
                    </div>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-10">
            <div class="nes-container with-title bg-white">
                <p class="title text-[10px] text-blue-500">Stats</p>
                <div class="text-xs space-y-4">
                    <div><span>代码力</span> <progress class="nes-progress is-primary" value="85" max="100"></progress></div>
                    <div><span>设计力</span> <progress class="nes-progress is-success" value="70" max="100"></progress></div>
                    <div><span>Debug</span> <progress class="nes-progress is-error" value="95" max="100"></progress></div>
                </div>
            </div>
            <div class="nes-container with-title bg-white text-xs">
                <p class="title text-[10px] text-yellow-600">Equipment</p>
                <ul class="nes-list is-disc">
                    <li>VS Code (神器)</li>
                    <li>React (护甲)</li>
                    <li>Tailwind (披风)</li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
