<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胡雨佳 | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/nes.css/css/nes.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f4f4f4] p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <nav class="nes-container is-rounded bg-white flex justify-around p-2 mb-4">
            <a href="index.html" class="nes-btn is-primary text-[10px]">STATUS</a>
            <a href="projects.html" class="nes-btn text-[10px]">ITEMS</a>
            <a href="about.html" class="nes-btn text-[10px]">LORE</a>
            <a href="contact.html" class="nes-btn text-[10px]">QUEST</a>
        </nav>

        <header class="nes-container with-title is-centered bg-white">
            <p class="title text-[10px]">Player Status</p>
            <div class="flex flex-col md:flex-row items-center gap-6 py-2">
                <img src="assets/avatar.jpg" class="pixel-avatar w-32 h-32 border-4 border-black">
                <div class="text-center md:text-left">
                    <h1 class="text-xl font-bold mb-2">胡雨佳 (HUTUTU)</h1>
                    <span class="nes-badge"><span class="is-primary text-[8px]">LV. 24 FULLSTACK</span></span>
                    <p class="text-xs mt-4 leading-relaxed">“正在加载更多代码... 目标是写出像艺术品一样的逻辑。”</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <section class="nes-container with-title bg-white">
                <p class="title text-[10px] text-red-500">Attributes</p>
                <ul class="text-xs space-y-4">
                    <li>❤️ 好奇心: 100% (探究型)</li>
                    <li>⭐ 美工力: 85% (像素风追求者)</li>
                    <li>👍 耐力: 无限 (Bug 终结者)</li>
                </ul>
            </section>
            <section class="nes-container with-title bg-white">
                <p class="title text-[10px] text-blue-500">Skills</p>
                <div class="space-y-4">
                    <div><p class="text-[8px] mb-2">HTML/CSS</p><progress class="nes-progress is-primary" value="90" max="100"></progress></div>
                    <div><p class="text-[8px] mb-2">JavaScript</p><progress class="nes-progress is-success" value="80" max="100"></progress></div>
                    <div><p class="text-[8px] mb-2">React/Next.js</p><progress class="nes-progress is-warning" value="70" max="100"></progress></div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
